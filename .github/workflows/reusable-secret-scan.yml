name: Reusable — Secret Detection (Gitleaks)

on:
  workflow_call:
    secrets:
      github-token:
        required: true
      gitleaks-license:
        required: false

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}
          GITLEAKS_LICENSE: ${{ secrets.gitleaks-license }}
